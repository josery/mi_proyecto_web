<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgilePlanner Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.css">
    <link href="https://unpkg.com/tabulator-tables@5.6.1/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="toast-container position-fixed top-0 end-0 p-3"></div>

    <div class="container-fluid mt-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="mb-0" id="project-title">AgilePlanner: PROYECTOS TIC</h1>
            <div class="btn-group" role="group">
                <button id="load-button" class="btn btn-primary">Cargar</button>
                <button id="save-button" class="btn btn-success">Guardar</button>
                <button id="save-as-button" class="btn btn-info">Guardar Como...</button>
            </div>
        </div>
        
        <ul class="nav nav-tabs" id="mainTab" role="tablist">
            <li class="nav-item" role="presentation"><button class="nav-link active" id="planning-tab" data-bs-toggle="tab" data-bs-target="#planning-pane" type="button" role="tab">Planificación</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="gantt-tab" data-bs-toggle="tab" data-bs-target="#gantt-pane" type="button" role="tab">Diagrama de Gantt</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="charts-tab" data-bs-toggle="tab" data-bs-target="#charts-pane" type="button" role="tab">Gráficos</button></li>
        </ul>

        <div class="tab-content" id="mainTabContent">
            <div class="tab-pane fade show active p-3" id="planning-pane" role="tabpanel">
                <div class="d-flex justify-content-start align-items-center mb-3 action-buttons">
                    <button id="add-activity-btn" class="btn btn-primary me-2">+ Añadir Actividad</button>
                    <div class="btn-group me-2" role="group">
                        <button id="add-task-btn" class="btn btn-secondary" disabled>+ Añadir Tarea</button>
                        <button id="add-subtask-btn" class="btn btn-secondary" disabled>+ Añadir Subtarea</button>
                    </div>
                    <div class="btn-group me-2" role="group">
                        <button id="edit-task-btn" class="btn btn-warning" disabled>Editar</button>
                        <button id="delete-task-btn" class="btn btn-danger" disabled>Eliminar</button>
                    </div>
                    <div class="btn-group" role="group">
                        <button id="move-up-btn" class="btn btn-outline-secondary" disabled title="Mover Arriba"><i class="bi bi-arrow-up"></i></button>
                        <button id="move-down-btn" class="btn btn-outline-secondary" disabled title="Mover Abajo"><i class="bi bi-arrow-down"></i></button>
                        <button id="indent-btn" class="btn btn-outline-secondary" disabled title="Aumentar Sangría"><i class="bi bi-text-indent-left"></i></button>
                        <button id="unindent-btn" class="btn btn-outline-secondary" disabled title="Disminuir Sangría"><i class="bi bi-text-indent-right"></i></button>
                    </div>
                </div>
                <div id="task-table"></div>
            </div>
            <div class="tab-pane fade p-3" id="gantt-pane" role="tabpanel">
                <div class="gantt-container"><svg id="gantt-chart"></svg></div>
            </div>
            <div class="tab-pane fade p-3" id="charts-pane" role="tabpanel">
                <h4>Gráficos de Avance</h4>
                <div style="max-width: 500px; margin: auto;"><canvas id="pie-chart"></canvas></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="task-modal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="modal-title">Detalles de la Tarea</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="task-form">
                        <input type="hidden" id="task-id"><input type="hidden" id="parent-id">
                        <div class="mb-3"><label for="task-title" class="form-label">Título</label><input type="text" class="form-control" id="task-title" required></div>
                        <div class="mb-3"><label for="task-responsable" class="form-label">Responsable</label><input type="text" class="form-control" id="task-responsable" required></div>
                        <div class="row">
                            <div class="col-md-4 mb-3"><label for="task-inicio" class="form-label">Fecha de Inicio</label><input type="date" class="form-control" id="task-inicio"></div>
                            <div class="col-md-4 mb-3"><label for="task-fin-previsto" class="form-label">Fecha Fin Previsto</label><input type="date" class="form-control" id="task-fin-previsto"></div>
                            <div class="col-md-4 mb-3"><label for="task-fin-real" class="form-label">Fecha Fin Real</label><input type="date" class="form-control" id="task-fin-real"></div>
                        </div>
                        <div class="mb-3"><label for="task-avance" class="form-label">% Avance Reportado</label><input type="number" class="form-control" id="task-avance" min="0" max="100" step="1"></div>
                    </form>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="button" class="btn btn-primary" id="save-task-btn">Guardar Cambios</button></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.6.1/dist/js/tabulator.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
